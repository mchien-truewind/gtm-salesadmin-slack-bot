name: Apollo Phone Enrichment

on:
  workflow_dispatch:
    inputs:
      sheet_id:
        description: Google Sheet ID
        required: true
        default: "1ftKEvAFFyietBwBKieylaEc5LvVjwE0_GvmrfnjmUP4"
      source_tab:
        description: Source tab name
        required: false
        default: "Non-Accounting Firm Buyers (2025)"
      target_tab:
        description: Target tab name
        required: false
        default: "Non-Accounting Buyers Enriched"
      max_poll_minutes:
        description: Max webhook polling time
        required: false
        default: "480"
      max_submit:
        description: Optional submission cap (blank for all)
        required: false
        default: ""
  schedule:
    - cron: "0 9 * * *"

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 540
    env:
      APOLLO_SEARCH: ${{ secrets.APOLLO_SEARCH }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-api-python-client google-auth google-auth-httplib2

      - name: Prepare token and output paths
        run: |
          mkdir -p secrets outputs/contact_enrichment
          printf '%s' '${{ secrets.GOOGLE_DRIVE_TOKEN_JSON }}' > secrets/google-drive-token.json

      - name: Run enrichment
        run: |
          MAX_SUBMIT_ARGS=""
          if [ -n "${{ inputs.max_submit }}" ]; then
            MAX_SUBMIT_ARGS="--max-submit ${{ inputs.max_submit }}"
          fi
          python scripts/contact_enrichment/apollo_webhook_sheet_enrich.py \
            --sheet-id "${{ inputs.sheet_id || '1ftKEvAFFyietBwBKieylaEc5LvVjwE0_GvmrfnjmUP4' }}" \
            --source-tab "${{ inputs.source_tab || 'Non-Accounting Firm Buyers (2025)' }}" \
            --target-tab "${{ inputs.target_tab || 'Non-Accounting Buyers Enriched' }}" \
            --google-token-file "secrets/google-drive-token.json" \
            --state-file "outputs/contact_enrichment/apollo_webhook_enrichment_state.json" \
            --summary-file "outputs/contact_enrichment/apollo_webhook_enrichment_summary.json" \
            --max-poll-minutes "${{ inputs.max_poll_minutes || '480' }}" \
            $MAX_SUBMIT_ARGS

      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: apollo-phone-enrichment-outputs
          path: |
            outputs/contact_enrichment/apollo_webhook_enrichment_state.json
            outputs/contact_enrichment/apollo_webhook_enrichment_summary.json
          if-no-files-found: warn
