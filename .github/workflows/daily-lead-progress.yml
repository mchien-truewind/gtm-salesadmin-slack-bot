name: Daily Lead Progress

on:
  workflow_dispatch:
    inputs:
      target_channel:
        description: "Optional Slack channel override"
        required: false
        default: ""
      force:
        description: "Bypass the 6 PM Pacific gate"
        required: false
        default: true
        type: boolean
  schedule:
    - cron: "0,10 1 * * *"
    - cron: "0,10 2 * * *"

permissions:
  contents: read

jobs:
  post-progress:
    runs-on: ubuntu-latest
    env:
      SLACK_USER_TOKEN: ${{ secrets.SLACK_USER_TOKEN }}
      LEAD_REPORT_TARGET_CHANNEL: ${{ vars.LEAD_REPORT_TARGET_CHANNEL }}
      LEAD_REPORT_INBOUND_CHANNEL: ${{ vars.LEAD_REPORT_INBOUND_CHANNEL }}
      LEAD_REPORT_OUTBOUND_CHANNEL: ${{ vars.LEAD_REPORT_OUTBOUND_CHANNEL }}
      LEAD_REPORT_INBOUND_PHRASE: ${{ vars.LEAD_REPORT_INBOUND_PHRASE }}
      LEAD_REPORT_OUTBOUND_PHRASE: ${{ vars.LEAD_REPORT_OUTBOUND_PHRASE }}
      LEAD_REPORT_TIMEZONE: ${{ vars.LEAD_REPORT_TIMEZONE }}
      LEAD_REPORT_WEEKLY_GOAL: ${{ vars.LEAD_REPORT_WEEKLY_GOAL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Post daily progress
        shell: bash
        run: |
          set -euo pipefail

          args=()
          if [[ -n "${{ inputs.target_channel }}" ]]; then
            args+=(--target-channel "${{ inputs.target_channel }}")
          fi
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.force }}" == "true" ]]; then
            args+=(--force)
          fi

          python3 scripts/slack/post_daily_progress.py "${args[@]}"
