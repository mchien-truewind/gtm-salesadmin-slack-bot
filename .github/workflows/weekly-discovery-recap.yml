name: Weekly Discovery Recap

on:
  schedule:
    # DST-safe: run at both UTC hours for 6 AM Pacific on Wed/Fri, then gate by Pacific hour.
    - cron: "15 13 * * 3,5"
    - cron: "15 14 * * 3,5"
  workflow_dispatch:
    inputs:
      target_channel:
        description: "Optional channel override (default: gtm-general)"
        required: false
        type: string
      window_days:
        description: "Lookback days for first discovery calls"
        required: false
        default: "7"
        type: string
      force_run:
        description: "Bypass schedule gating"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  post-weekly-discovery-recap:
    runs-on: ubuntu-latest
    concurrency:
      group: weekly-discovery-recap
      cancel-in-progress: false
    env:
      SLACK_USER_TOKEN: ${{ secrets.SLACK_USER_TOKEN }}
      READ_AI_TOKENS_JSON: ${{ secrets.READ_AI_TOKENS_JSON }}
      READ_AI_OAUTH_STATE_JSON: ${{ secrets.READ_AI_OAUTH_STATE_JSON }}
      READ_AI_DISCOVERY_PAIN_CHANNEL: ${{ github.event.inputs.target_channel || vars.READ_AI_DISCOVERY_PAIN_CHANNEL || 'gtm-general' }}
      INPUT_WINDOW_DAYS: ${{ github.event.inputs.window_days || '7' }}
      INPUT_FORCE_RUN: ${{ github.event.inputs.force_run || 'false' }}
      INPUT_SCHEDULE: ${{ github.event.schedule || '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Schedule Gate (6 AM Pacific)
        id: gate
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" != "schedule" ]]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          pacific_hour="$(TZ=America/Los_Angeles date +%H)"
          if [[ "${pacific_hour}" == "06" ]]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "Skipping: scheduled UTC slot ${INPUT_SCHEDULE} mapped to Pacific hour ${pacific_hour}"
          fi

      - name: Validate Secrets
        if: steps.gate.outputs.should_run == 'true'
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${SLACK_USER_TOKEN}" ]]; then
            echo "Missing secret: SLACK_USER_TOKEN" >&2
            exit 1
          fi
          if [[ -z "${READ_AI_TOKENS_JSON}" ]]; then
            echo "Missing secret: READ_AI_TOKENS_JSON" >&2
            exit 1
          fi
          if [[ -z "${READ_AI_OAUTH_STATE_JSON}" ]]; then
            echo "Missing secret: READ_AI_OAUTH_STATE_JSON" >&2
            exit 1
          fi

      - name: Write Read.ai Token Files
        if: steps.gate.outputs.should_run == 'true'
        shell: bash
        run: |
          set -euo pipefail
          tokens_path="${RUNNER_TEMP}/read_ai_tokens.json"
          oauth_path="${RUNNER_TEMP}/read_ai_oauth_state.json"
          printf '%s' "${READ_AI_TOKENS_JSON}" > "${tokens_path}"
          printf '%s' "${READ_AI_OAUTH_STATE_JSON}" > "${oauth_path}"
          echo "READ_AI_TOKENS_FILE=${tokens_path}" >> "$GITHUB_ENV"
          echo "READ_AI_OAUTH_STATE_FILE=${oauth_path}" >> "$GITHUB_ENV"

      - name: Post Weekly Discovery Recap
        if: steps.gate.outputs.should_run == 'true'
        shell: bash
        run: |
          set -euo pipefail

          args=(
            --post-to-slack
            --schedule-mode wed_fri_split
            --window-days "${INPUT_WINDOW_DAYS}"
            --cutoff-hour 6
            --max-meetings 5000
            --output-file outputs/read_ai/customer_call_recap/first_discovery_pain_latest.md
          )

          if [[ "${INPUT_FORCE_RUN}" == "true" ]]; then
            args+=(--force-run)
          fi

          python3 scripts/read_ai/post_first_discovery_pain_digest.py "${args[@]}"
